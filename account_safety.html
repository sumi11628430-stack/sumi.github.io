<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>口座番号のご提供について</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --border: #1e2a3a;
    --accent: #3b82f6;
    --accent-soft: rgba(59,130,246,0.1);
    --accent2: #10b981;
    --accent2-soft: rgba(16,185,129,0.08);
    --warn: #f59e0b;
    --warn-soft: rgba(245,158,11,0.08);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #475569;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.8;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }
  .header {
    text-align: center;
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards;
  }
  .header-badge {
    display: inline-block;
    background: var(--accent-soft);
    border: 1px solid rgba(59,130,246,0.2);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
    font-family: 'Noto Serif JP', serif;
  }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    font-size: clamp(22px, 5vw, 32px);
    line-height: 1.5;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .header-sub {
    color: var(--text-muted);
    font-size: 14px;
    letter-spacing: 0.03em;
  }
  .section {
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.7s ease forwards;
  }
  .section:nth-child(2) { animation-delay: 0.15s; }
  .section:nth-child(3) { animation-delay: 0.25s; }
  .section:nth-child(4) { animation-delay: 0.35s; }
  .section:nth-child(5) { animation-delay: 0.45s; }
  .section:nth-child(6) { animation-delay: 0.55s; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: rgba(59,130,246,0.25); }
  .card-accent { border-left: 3px solid var(--accent); }
  .card-green  { border-left: 3px solid var(--accent2); background: var(--accent2-soft); border-color: rgba(16,185,129,0.2); }
  .card-warn   { border-left: 3px solid var(--warn); background: var(--warn-soft); border-color: rgba(245,158,11,0.2); }
  .section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 500;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 0.03em;
  }
  p {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  p:last-child { margin-bottom: 0; }
  .why-steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 4px;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 14px;
    color: var(--text-muted);
  }
  .step-num {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 1px solid rgba(59,130,246,0.3);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 4px;
  }
  @media (max-width: 500px) {
    .compare-grid { grid-template-columns: 1fr; }
  }
  .compare-box {
    border-radius: 8px;
    padding: 16px 18px;
  }
  .compare-box.ok  { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.15); }
  .compare-box.ng  { background: rgba(239,68,68,0.06);  border: 1px solid rgba(239,68,68,0.15); }
  .compare-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .ok .compare-title { color: var(--accent2); }
  .ng .compare-title { color: #f87171; }
  .compare-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 7px;
    line-height: 1.5;
  }
  .compare-item:last-child { margin-bottom: 0; }
  .icon { flex-shrink: 0; font-size: 13px; }
  .safety-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }
  .safety-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .safety-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
    color: var(--accent2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }
  .flow {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 4px;
  }
  .flow-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    font-size: 14px;
    color: var(--text-muted);
    position: relative;
    padding-bottom: 20px;
  }
  .flow-item:last-child { padding-bottom: 0; }
  .flow-line {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .flow-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--bg);
    outline: 2px solid rgba(59,130,246,0.3);
    margin-top: 5px;
    flex-shrink: 0;
  }
  .flow-connector {
    width: 1px;
    flex: 1;
    min-height: 28px;
    background: linear-gradient(var(--accent), rgba(59,130,246,0.1));
    margin-top: 4px;
  }
  .flow-item:last-child .flow-connector { display: none; }
  .summary-card {
    background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(16,185,129,0.06));
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 12px;
    padding: 28px 32px;
    text-align: center;
  }
  .summary-card p {
    font-size: 15px;
    color: var(--text);
    line-height: 1.9;
  }
  @keyframes fadeUp {
    from { opacity: 0; tr

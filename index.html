<script>
// ── 雲を生成 ──
const cloudDefs = [
  { w:320, h:120, top:'8%',  dur:55, delay:0   },
  { w:200, h: 80, top:'18%', dur:70, delay:-20 },
  { w:260, h:100, top:'5%',  dur:80, delay:-40 },
  { w:180, h: 70, top:'28%', dur:60, delay:-10 },
  { w:300, h:110, top:'14%', dur:90, delay:-55 },
];
cloudDefs.forEach(c => {
  const el = document.createElement('div');
  el.className = 'cloud';
  el.style.cssText = `width:${c.w}px;height:${c.h}px;top:${c.top};left:-350px;animation-duration:${c.dur}s;animation-delay:${c.delay}s;`;
  document.body.appendChild(el);
});

// ── 羽アニメーション ──
const canvas = document.getElementById('featherCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 羽を描画する関数（シンプルな羽形）
function drawFeather(ctx, x, y, size, angle, alpha, hue) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;

  // 軸
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.5);
  ctx.lineTo(0,  size * 0.5);
  ctx.strokeStyle = `hsla(${hue},60%,75%,0.9)`;
  ctx.lineWidth = size * 0.045;
  ctx.stroke();

  // 左羽弁
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.45);
  ctx.bezierCurveTo(-size * 0.55, -size * 0.1,  -size * 0.5,  size * 0.2,  0, size * 0.48);
  ctx.strokeStyle = `hsla(${hue},55%,82%,0.6)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = `hsla(${hue},70%,92%,0.22)`;
  ctx.fill();

  // 右羽弁
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.45);
  ctx.bezierCurveTo( size * 0.55, -size * 0.1,   size * 0.5,  size * 0.2,  0, size * 0.48);
  ctx.strokeStyle = `hsla(${hue},55%,82%,0.6)`;
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = `hsla(${hue},70%,92%,0.22)`;
  ctx.fill();

  // 羽毛の細線（左）
  for (let i = 0; i < 7; i++) {
    const t  = i / 7;
    const sy = -size * 0.4 + t * size * 0.85;
    const ex = -size * (0.38 - t * 0.06);
    const ey = sy + size * 0.08;
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `hsla(${hue},50%,85%,0.35)`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
  // 羽毛の細線（右）
  for (let i = 0; i < 7; i++) {
    const t  = i / 7;
    const sy = -size * 0.4 + t * size * 0.85;
    const ex =  size * (0.38 - t * 0.06);
    const ey = sy + size * 0.08;
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(ex, ey);
    ctx.strokeStyle = `hsla(${hue},50%,85%,0.35)`;
    ctx.lineWidth = 0.7;
    ctx.stroke();
  }
  ctx.restore();
}

// 羽パーティクル
const FEATHER_COUNT = 22;
const hues = [200, 210, 195, 220, 185, 205, 215];
const feathers = Array.from({ length: FEATHER_COUNT }, (_, i) => ({
  x:     Math.random() * window.innerWidth,
  y:     Math.random() * window.innerHeight,
  size:  18 + Math.random() * 28,
  angle: Math.random() * Math.PI * 2,
  vx:    (Math.random() - 0.5) * 0.4,
  vy:    0.25 + Math.random() * 0.45,
  va:    (Math.random() - 0.5) * 0.012,
  alpha: 0.4 + Math.random() * 0.5,
  hue:   hues[i % hues.length],
  wobble: Math.random() * Math.PI * 2,
  wobbleSpeed: 0.008 + Math.random() * 0.012,
}));

function animateFeathers(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  feathers.forEach(f => {
    f.wobble += f.wobbleSpeed;
    f.x += f.vx + Math.sin(f.wobble) * 0.5;
    f.y += f.vy;
    f.angle += f.va;
    if (f.y > canvas.height + 60) {
      f.y = -60;
      f.x = Math.random() * canvas.width;
    }
    drawFeather(ctx, f.x, f.y, f.size, f.angle, f.alpha, f.hue);
  });
  requestAnimationFrame(animateFeathers);
}
requestAnimationFrame(animateFeathers);
</script>

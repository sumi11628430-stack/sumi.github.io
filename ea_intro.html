<style>
  :root {
    --accent: #3b82f6;
    --accent-glow: rgba(59, 130, 246, 0.5);
    --gold: #d4af37;
    --gold-glow: rgba(212, 175, 55, 0.4);
    --bg-dark: #020617;
    --card-bg: rgba(15, 23, 42, 0.8);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --border: rgba(255, 255, 255, 0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    line-height: 1.8;
    min-height: 100vh;

  }
  #bgCanvas {

  .container {

    z-index: 1;
    max-width: 800px;

    padding: 80px 24px 100px;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--accent);
    font-size: 13px;
    text-decoration: none;
    margin-bottom: 40px;

  .header {

  }
  .header-badge {
    display: inline-block;
    background: rgba(212, 175, 55, 0.1);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 24px;
    font-family: 'Noto Serif JP', serif;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Noto Serif JP', serif;
    font-weight: 600;
    font-size: clamp(24px, 5vw, 36px);
    line-height: 1.4;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
  }
  .header-sub {
    color: var(--text-muted);
    font-size: 15px;
    max-width: 600px;
    margin: 0 auto;
  }
  .ea-list {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .ea-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 28px;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    animation: fadeUp 0.8s ease both;
    position: relative;
    overflow: hidden;
  }
  .ea-card::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
    transition: 0.5s;
  }
  .ea-card:hover::before { left: 100%; }
  .ea-card:hover {
    transform: translateY(-8px);
    border-color: var(--accent);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(59, 130, 246, 0.2);
  }
  .ea-icon {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(37,99,235,0.05));
    border: 1px solid rgba(59,130,246,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 20px rgba(59,130,246,0.1);
  }
  .ea-body { flex: 1; min-width: 0; }
  .ea-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .ea-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-blue { background: rgba(59,130,246,0.15); border: 1px solid var(--accent); color: #93c5fd; }
  .badge-gold { background: rgba(212,175,55,0.1); border: 1px solid var(--gold); color: var(--gold); }
  .ea-desc { font-size: 14px; color: var(--text-muted); line-height: 1.8; }
  .ea-arrow {
    flex-shrink: 0;
    font-size: 24px;
    color: var(--text-muted);
    transition: all 0.3s ease;
  }
  .ea-card:hover .ea-arrow { transform: translateX(8px); color: var(--accent); }
  
  .ea-card-coming {
    background: rgba(15, 23, 42, 0.4);
    border: 1px dashed rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 32px;
    display: flex;
    align-items: center;
    gap: 28px;
    opacity: 0.7;
  }
  .coming-icon {
    flex-shrink: 0;
    width: 70px;
    height: 70px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  .coming-label { font-size: 16px; color: var(--text-muted); margin-bottom: 8px; }
  .coming-badge {
    display: inline-block;
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  
  @media(max-width:600px){
    .ea-card { padding: 24px; gap: 20px; flex-direction: column; text-align: center; }
    .ea-meta { justify-content: center; }
    .ea-arrow { display: none; }
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="container">
  <a href="index.html" class="back-link">← BACK TO HOME</a>
  <div class="header">
    <div class="header-badge">Trading Solutions</div>
    <h1>配布中 EA 一覧</h1>
    <p class="header-sub"></p>
  </div>
  <div class="ea-list">
    <a href="ea_01.html" class="ea-card">
      <div class="ea-icon">🤖</div>
      <div class="ea-body">
        <div class="ea-name">Re：【STYLE】クラスター_iF~</div>
        <div class="ea-meta">
          <span class="badge badge-blue">MT4 / MT5</span>
          <span class="badge badge-gold">GOLD SPECIALIZED</span>
        </div>
        <div class="ea-desc">旧EAでは利点でもあり、現EAでは弱点でもある「インターバル」の概念を撤廃し時間足とインジケーターと静観モードにより過去数年～十数年間のボラティリティと2025~26年の異常ボラティリティに対応した「静観モードにより長期保有する時もあるんですナンピンEA」</div>
      </div>
      <div class="ea-arrow">›</div>
    </a>
    <div class="ea-card-coming">
      <div class="coming-icon">🔧</div>
      <div class="coming-body">
        <div class="coming-label">次機EA開発中…リリース日未定</div>
        <div class="coming-badge">Under Development</div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── 精密なダークデザイン（B案） ──
const particles = [];
const particleCount = 60;
const connectionDistance = 150;

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.r = Math.random() * 1.5 + 0.5;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
}

for (let i = 0; i < particleCount; i++) {
  particles.push(new Particle());
}

function drawGrid(t) {
  ctx.strokeStyle = 'rgba(59, 130, 246, 0.03)';
  ctx.lineWidth = 1;
  const gridSize = 50;
  const offsetX = (t * 0.02) % gridSize;
  const offsetY = (t * 0.02) % gridSize;
  
  for (let x = offsetX; x < canvas.width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = offsetY; y < canvas.height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

function animate(t) {
  ctx.fillStyle = '#020617';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  drawGrid(t);
  
  // 幾何学ライン
  particles.forEach((p, i) => {
    p.update();
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(59, 130, 246, 0.4)';
    ctx.fill();
    
    for (let j = i + 1; j < particles.length; j++) {
      const p2 = particles[j];
      const dx = p.x - p2.x;
      const dy = p.y - p2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < connectionDistance) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(59, 130, 246, ${0.15 * (1 - dist / connectionDistance)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  });
  
  // ゴールドの光彩（四隅に薄く）
  const grad = ctx.createRadialGradient(canvas.width, 0, 0, canvas.width, 0, canvas.width * 0.6);
  grad.addColorStop(0, 'rgba(212, 175, 55, 0.05)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
